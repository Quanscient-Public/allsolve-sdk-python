variableOverrides:
  - name: pres_sweep
    overrides:
      - variable: pres
        values: linspace(100000, 400000, 4) # Allsolve expression or raw list: [100000, 200000, 300000, 400000]
  - name: multi_sweep
    overrides:
      - variable: pres
        values: linspace(100000, 400000, 4)
      - variable: test2
        values: linspace(1, 10, 3)
    sweepType:
      cartesian_product
      # Overriding with a single value also works:
      #- variable: pres
      #  values: 400000
meshes:
  - name: test_mesh
    scaleFactor: 0.7 # optional, defaults to 1
    refinements:
      - region: cubes
        maxSize: 1000 / pres
    # simpleExtrusion:
    #   regions:
    #     - drive
    #   subLayerCounts: [ floor(pres / 5000) ] # list of Allsolve expressions or raw values
    saveMesh: true # save the mesh locally for inspection, defaults to false
    createOnly: false # optional, if true, mesh will be created only (not run)
    useMeshRefiner: true # Use automatic refinement where manual refinements are not set, defaults to true
    curvatureEnhancement: 6 # optional, defaults to 6
    targetWidthToHeightRatio: 4 # optional, defaults to 4
    curvedMesh: false # optional, defaults to false
    maxRunTimeMinutes: 15 # optional, defaults to 15
    variableOverride: pres_sweep
    #meshSizeMax: 0.1 # optional, defaults to no max
    #meshSizeMin: 0.01 # optional, defaults to no min
simulations:
  - name: test_simulation
    description: Test simulation description
    maxRunTimeMinutes: 10 # optional, defaults to 10
    solverMode: direct # optional, "direct" or "iterative", defaults to "direct"
    mesh: test_mesh # optional, name of mesh to use
    variableOverride: pres_sweep # optional, name of variable override to use
    runtime: # optional
      nodeType: CORES_1_16GB # optional, defaults to CORES_3_10GB_FAST_START
      # Available node types: CORES_1_16GB, CORES_2_32GB, CORES_3_10GB_FAST_START,
      # CORES_4_64GB, CORES_8_128GB, CORES_16_256GB, CORES_32_512GB
      nodeCount: 1 # optional, defaults to 1
    scripts: # optional
      - filepath: sim/simulation.py # resolved relative to YAML file location
        isMain: true # optional, defaults to false
      # - filepath: sim/params.py
      #   isMain: false
