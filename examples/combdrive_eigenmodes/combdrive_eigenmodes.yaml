physics:
- type: solidMechanics
  interactions:
  - type: clamp
    name: Clamp
    enabled: true
    target: clamp
meshes:
- name: Mesh 1
  useMeshRefiner: false
  scaleFactor: 0.25
  curvatureEnhancement: 12.0
  targetWidthToHeightRatio: 4.0
  maxRunTimeMinutes: 60
  simpleExtrusion:
