name: Combdrive Eigenmodes demo
description: Eigenmode analysis of a MEMS comb-drive accelerometer to find the first
  5 or more eigenmodes.
dimension: 3
geometries:
- name: Comb_drive_Accelerometer.gds
  type: gds2
  filepath: Comb_drive_Accelerometer.gds
  cleanup: true
  unit: micrometer
  layers:
  - layer: 23
    type: 0
    absoluteZ0: '61.25'
    thickness: '0.1'
    name: Layer 23
  - layer: 2
    type: 0
    absoluteZ0: '31.25'
    thickness: '30.0'
    name: Layer 2
  - layer: 12
    type: 0
    absoluteZ0: '31.0'
    thickness: '0.25'
    name: Layer 12
  - layer: 1
    type: 0
    absoluteZ0: '1.0'
    thickness: '30.0'
    name: Layer 1
  - layer: 11
    type: 0
    absoluteZ0: '0.0'
    thickness: '1.0'
    name: Layer 11
  extrudeParameters:
    unifyLayerDiscretizations: 'off'
    fuzzyValue: 0.0001
    featureAngleThreshold: 30.0
    lengthRatioThreshold: 5.0
    circleMaxArcAnglePerSegment: 5.625
    circleFitToleranceFraction: 200.0
    splineMethod: iterative
    splineTolerance: 0.1
    iterativeMaxIterations: '5'
