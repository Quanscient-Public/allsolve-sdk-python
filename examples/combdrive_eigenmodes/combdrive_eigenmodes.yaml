    - '10'
    - '5'
    - '10'
    - '5'
simulations:
- name: Simulation 1
  description: ''
  maxRunTimeMinutes: 60
  solverMode: iterative
  analysisType: eigenmode
  mesh: Mesh 1
  physics:
