name: PMUT array demo
description: Simulation of ultrasound emission from an array of PMUTs.
dimension: 3
pmlSettings:
  numLayers: 2
variables:
- name: R
  expression: 100e-6
  description: Cavity radius
- name: thmem
  expression: 10e-6
  description: Membrane thickness
- name: thpiezo
  expression: 2e-6
  description: Piezo thickness
- name: thcavity
  expression: 20e-6
  description: Cavity thickness
- name: n
  expression: '2'
  description: Array size (even numbers only)
- name: freq
  expression: 1e6
  description: Frequency
- name: Rair
  expression: 5*R*n
  description: Air bubble radius
geometries:
- name: Membrane
  type: cylinder
  position:
    x: -4*R*(n-1)/2
    y: -4*R*(n-1)/2
    z: 0.0
  axis:
    x: 0.0
    y: 0.0
    z: thmem
  radius: R
- name: Piezo
  type: cylinder
  position:
    x: -4*R*(n-1)/2
    y: -4*R*(n-1)/2
    z: thmem/2 + thpiezo/2
  axis:
    x: 0.0
    y: 0.0
    z: thpiezo
  radius: 0.67*R
- name: Cavity
  type: cylinder
  position:
    x: -4*R*(n-1)/2
    y: -4*R*(n-1)/2
    z: -thcavity/2 - thmem/2
  axis:
    x: 0.0
    y: 0.0
    z: thcavity
  radius: R
- name: PMUT_grid
  type: grid
  translation:
    x: 4*R
    y: 4*R
    z: 0.0
  size:
    x: n
    y: n
    z: '1'
  cadNames:
  - Membrane
  - Piezo
  - Cavity
- name: Air_sphere
  type: sphere
  position:
    x: 0.0
    y: 0.0
    z: 0.0
  radius: Rair
- name: Sphere_bottom_cut
  type: box
  position:
    x: 0.0
    y: 0.0
    z: (-Rair + thmem/2) / 2
  size:
    x: 2*Rair + 0.001
    y: 2*Rair + 0.001
    z: Rair + thmem/2
- name: Air_dome
  type: difference
  cadNames1:
  - Air_sphere
  cadNames2:
  - Sphere_bottom_cut
  deleteTool: true
- name: Baseplate
  type: cylinder
  position:
    x: 0.0
    y: 0.0
    z: -thcavity/2
  axis:
    x: 0.0
    y: 0.0
    z: thmem + thcavity
  radius: Rair
- name: Baseplate_with_holes
  type: difference
  cadNames1:
  - Baseplate
  cadNames2:
  - Cavity
  deleteTool: true
- name: Baseplate_with_holes_2
  type: difference
  cadNames1:
  - Baseplate
  cadNames2:
  - Membrane
  deleteTool: false
- name: Air_dome_2
  type: difference
  cadNames1:
  - Air_sphere
  cadNames2:
  - Piezo
  deleteTool: false
regions:
- name: air_bubble
  entityType: volume
  type: geometrySelector
  minSize:
    x: 1.5*Rair
    y: 1.5*Rair
    z: 0.5*Rair
- name: pzt
  entityType: volume
  type: geometrySelector
  maxSize:
    x: 2*0.67*R
    y: 2*0.67*R
    z: thpiezo
- name: membranes
  entityType: volume
  type: regionRule
  attributePath:
  - key: name
    value: Membrane
- name: baseplate_clamp
  entityType: volume
  type: regionRule
  attributePath:
  - key: name
    value: Baseplate
- name: air_dome_surface
  entityType: surface
  type: geometrySelector
  boundingBox:
    min:
      x: -Rair
      y: -Rair
      z: '0'
    max:
      x: Rair
      y: Rair
      z: Rair
  minSize:
    x: Rair
    y: Rair
    z: 0.5*Rair
- name: pzt_bottom_surfaces
  entityType: surface
  type: regionRule
  attributePath:
  - key: name
    value: Piezo
  boundingBox:
    min:
      x: -4*R*(n-1)/2 - R
      y: -4*R*(n-1)/2 - R
      z: thmem/2
    max:
      x: 4*R*(n-1)/2 + R
      y: 4*R*(n-1)/2 + R
      z: thmem/2
- name: pzt_top_surfaces
  entityType: surface
  type: regionRule
  attributePath:
  - key: name
    value: Piezo
  boundingBox:
    min:
      x: -4*R*(n-1)/2 - R
      y: -4*R*(n-1)/2 - R
      z: thmem/2 + thpiezo
    max:
      x: 4*R*(n-1)/2 + R
      y: 4*R*(n-1)/2 + R
      z: thmem/2 + thpiezo
- name: p_above
  entityType: point
  type: geometrySelector
  boundingBox:
    min:
      x: -0.1*Rair
      y: -0.1*Rair
      z: 0.9*Rair
    max:
      x: 0.1*Rair
      y: 0.1*Rair
      z: 1.1*Rair
- name: mono_si
  entityType: volume
  type: computed
  operation: union
  regions:
  - baseplate_clamp
  - membranes
- name: solid_volumes
  entityType: volume
  type: computed
  operation: union
  regions:
  - mono_si
  - pzt
materials:
- name: Air
  description: Air, 20 C, 100kPa
  color: '#99D9FF'
  target: air_bubble
  density: '1.225'
  heatCapacity: '1012'
  speedOfSound: '343'
  dynamicViscosity: '1.8e-05'
  electricConductivity: '0'
  electricPermittivity: epsilon0
  magneticPermeability: mu0
  thermalConductivity: '0.026'
